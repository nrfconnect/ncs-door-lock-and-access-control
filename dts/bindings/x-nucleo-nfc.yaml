description: |
    STMicroelectronics ST25R NFC readers

compatible: "x-nucleo-nfc"

include: spi-device.yaml

properties:
  irq-gpios:
    type: phandle-array
    required: true

  reset-gpios:
    type: phandle-array
    required: false

  led-nfca-gpios:
    type: phandle-array
    required: false

  led-nfcb-gpios:
    type: phandle-array
    required: false

  led-nfcf-gpios:
    type: phandle-array
    required: false
