sample:
  description: Door lock sample application
  name: ncs-door-lock-sample
common:
  sysbuild: true
  build_only: true
tests:
  libs.door_lock.nfc:
    platform_allow:
      - nrf52840dk/nrf52840
      - nrf5340dk/nrf5340/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54lm20dk/nrf54lm20a/cpuapp
    integration_platforms:
      - nrf52840dk/nrf52840
      - nrf5340dk/nrf5340/cpuapp
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54lm20dk/nrf54lm20a/cpuapp
    extra_args:
      - SB_CONFIG_BOOTLOADER_NONE=y
      - SB_CONFIG_NETCORE_NONE=y
  libs.door_lock.ble-uwb:
    platform_allow:
      - nrf5340dk/nrf5340/cpuapp
      - nrf54lm20dk/nrf54lm20a/cpuapp
    integration_platforms:
      - nrf5340dk/nrf5340/cpuapp
      - nrf54lm20dk/nrf54lm20a/cpuapp
    extra_args:
      - app_SNIPPET=uwb_qm35_src
      - SB_CONFIG_BOOTLOADER_NONE=y
      - SB_CONFIG_NETCORE_NONE=y
  sonarqube.door_lock:
    platform_allow:
      - nrf54lm20dk/nrf54lm20a/cpuapp
    integration_platforms:
      - nrf54lm20dk/nrf54lm20a/cpuapp
    extra_args:
      - SNIPPET=matter
      - app_SNIPPET="dfu_smp;uwb_qm35;bt_nus"
      - CONFIG_DOOR_LOCK_EXPEDITED_FAST_PHASE=y
      - CONFIG_DOOR_LOCK_STEP_UP_PHASE=y
      - CONFIG_DOOR_LOCK_CREDENTIAL_ISSUER_CA=y
  app.door_lock.nfc-ble-uwb.bt_nus-dfu_smp-exp_fast-step_up:
    platform_allow:
      - nrf5340dk/nrf5340/cpuapp
    integration_platforms:
      - nrf5340dk/nrf5340/cpuapp
    extra_args:
      - CONFIG_NCS_ALIRO_SRC=n
      - app_SNIPPET="uwb_qm35;dfu_smp;bt_nus"
      - CONFIG_DFU_SMP_LOG_LEVEL_DBG=y
      - CONFIG_DOOR_LOCK_EXPEDITED_FAST_PHASE=y
      - CONFIG_DOOR_LOCK_STEP_UP_PHASE=y
  app.door_lock.nfc-ble-uwb.dfu_smp-matter-exp_fast-step_up:
    platform_allow:
      - nrf54lm20dk/nrf54lm20a/cpuapp
    integration_platforms:
      - nrf54lm20dk/nrf54lm20a/cpuapp
    extra_args:
      - CONFIG_NCS_ALIRO_SRC=n
      - app_SNIPPET="uwb_qm35_src;dfu_smp"
      - SNIPPET=matter
      - CONFIG_DFU_SMP_LOG_LEVEL_DBG=y
      - CONFIG_DOOR_LOCK_EXPEDITED_FAST_PHASE=y
      - CONFIG_DOOR_LOCK_STEP_UP_PHASE=y
  app.door_lock.ble-uwb.dfu_smp-matter-step_up:
    platform_allow:
      - nrf54lm20dk/nrf54lm20a/cpuapp
    integration_platforms:
      - nrf54lm20dk/nrf54lm20a/cpuapp
