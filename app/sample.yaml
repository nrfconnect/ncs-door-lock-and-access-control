sample:
  description: Door lock sample application
  name: ncs-door-lock-sample
common:
  sysbuild: true
  build_only: true
tests:
  app.door_lock.nfc-ble-uwb.bt_nus-dfu_smp-exp_fast-step_up:
    platform_allow: &id001
    - nrf5340dk/nrf5340/cpuapp
    integration_platforms: *id001
    extra_args:
    - app_SNIPPET="uwb_qm35;dfu_smp;bt_nus"
    - CONFIG_DFU_SMP_LOG_LEVEL_DBG=y
    - CONFIG_DOOR_LOCK_EXPEDITED_FAST_PHASE=y
    - CONFIG_DOOR_LOCK_STEP_UP_PHASE=y
  app.door_lock.nfc-ble-uwb.dfu_smp-matter-exp_fast-step_up:
    platform_allow: &id002
    - nrf54lm20dk/nrf54lm20a/cpuapp
    integration_platforms: *id002
    extra_args:
    - app_SNIPPET="uwb_qm35"
    - SNIPPET=matter
    - CONFIG_CHIP_DFU_OVER_BT_SMP=y
    - CONFIG_DOOR_LOCK_EXPEDITED_FAST_PHASE=y
    - CONFIG_DOOR_LOCK_STEP_UP_PHASE=y
  app.door_lock.nfc-ble-uwb.dfu_smp-matter-step_up:
    platform_allow: *id002
    integration_platforms: *id002
    extra_args:
    - app_SNIPPET="uwb_qm35"
    - SNIPPET=matter
    - CONFIG_CHIP_DFU_OVER_BT_SMP=y
    - CONFIG_DOOR_LOCK_EXPEDITED_FAST_PHASE=n
    - CONFIG_DOOR_LOCK_STEP_UP_PHASE=y
  app.door_lock.nfc.dfu_smp-matter-step_up:
    platform_allow: &id003
    - nrf54l15dk/nrf54l15/cpuapp
    - nrf52840dk/nrf52840
    - nrf5340dk/nrf5340/cpuapp
    integration_platforms: *id003
    extra_args:
    - SNIPPET=matter
    - CONFIG_CHIP_DFU_OVER_BT_SMP=y
    - CONFIG_DOOR_LOCK_EXPEDITED_FAST_PHASE=n
    - CONFIG_DOOR_LOCK_STEP_UP_PHASE=y
  app.door_lock.nfc-ble-uwb.dfu_smp-step_up:
    platform_allow: *id002
    integration_platforms: *id002
    extra_args:
    - app_SNIPPET="uwb_qm35;dfu_smp"
    - CONFIG_DFU_SMP_LOG_LEVEL_DBG=y
    - CONFIG_DOOR_LOCK_EXPEDITED_FAST_PHASE=n
    - CONFIG_DOOR_LOCK_STEP_UP_PHASE=y
  app.door_lock.nfc.dfu_smp-step_up:
    platform_allow: *id003
    integration_platforms: *id003
    extra_args:
    - app_SNIPPET=dfu_smp
    - CONFIG_DFU_SMP_LOG_LEVEL_DBG=y
    - CONFIG_DOOR_LOCK_EXPEDITED_FAST_PHASE=n
    - CONFIG_DOOR_LOCK_STEP_UP_PHASE=y
