      - src-no
      - nfc
      - ble
      - bt_nus
      - dfu_smp
      - exp_fast
      - step_up
    platform_allow: *platform_5340
    integration_platforms: *platform_5340
    extra_args:
      - CONFIG_NCS_ALIRO_SRC=n
      - app_SNIPPET="uwb_qm35;dfu_smp;bt_nus"
      - CONFIG_DFU_SMP_LOG_LEVEL_DBG=y
