# This file specifies the sample applications that can be built using twister.
# Sample name consists of fields separated by dots in the following format:
#   '<kind>.<sample_name>.<protocols>.<features or EMPTY>'
#   Each field can consist of subfields delimited with '-' character.
#
# Regular sample with exp_fast enabled:
#   app.door_lock.ble-uwb.exp_fast
# Regular sample with only matter enabled:
#   app.door_lock.nfc.matter
# Sample with several features enabled plus matter:
#   app.door_lock.ble-uwb.exp_fast-dfu_smp-matter

# ---- Summary of samples ----
#
# --- Regular samples ---
# Samples to be built in nightly builds
#   SRC, 5340,  UWB+NFC, ALIRO_STANDALONE,  NUS+SMP, EXPF+STEPUP
#   LIB, 5340,  UWB+NFC, ALIRO_STANDALONE,  NUS+SMP, EXPF+STEPUP
#   SRC, 5340,  UWB+NFC,           MATTER,  NUS+SMP, EXPF+STEPUP
#   LIB, 5340,  UWB+NFC,           MATTER,  NUS+SMP, EXPF+STEPUP

#   SRC,54LM20, UWB+NFC,           MATTER,      NUS,        EXPF
#         5340,     NFC,
#        54L15,     NFC,
#        52840,     NFC,
#   SRC,54LM20, UWB+NFC, ALIRO_STANDALONE,      NUS,        EXPF
#         5340,     NFC,
#        54L15,     NFC,
#        52840,     NFC,
#   LIB,54LM20, UWB+NFC,           MATTER,      SMP,      STEPUP
#         5340,     NFC,
#        54L15,     NFC,
#        52840,     NFC,
#   LIB,54LM20, UWB+NFC, ALIRO_STANDALONE,      SMP,      STEPUP
#         5340,     NFC,
#        54L15,     NFC,
#        52840,     NFC,
#
# --- Smoke samples ---
# Samples to be built on each PR
#   SRC,  5340, UWB+NFC, ALIRO_STANDALONE, NUS+SMP, EXPF+STEPUP + CACERT
#   LIB,  5340, UWB+NFC,           MATTER,    NONE, EXPF+STEPUP
#   LIB,54LM20, UWB+NFC, ALIRO_STANDALONE,    NONE,        NONE
#   SRC, 54L15,     NFC,           MATTER,     SMP,        EXPF
#   LIB, 52840,     NFC, ALIRO_STANDALONE,     NUS,      STEPUP
#   SRC,  5340,     NFC, ALIRO_STANDALONE,    NONE,        NONE
#
# --- Libs samples ---
# Base apps for all samples only for libs build
#   SRC,         ALL, ALIRO_STANDALONE,     NONE,       NONE
#
# --- Sonarqube sample ---
# Samples for sonarqube tests


sample:
  description: Door lock sample application
  name: ncs-door-lock-sample
common:
  sysbuild: true
  build_only: true
tests:
# SRC,  5340,  UWB+NFC, ALIRO_STANDALONE, NUS+SMP, EXPF+STEPUP
  app.door_lock.nfc-ble-uwb.bt_nus-dfu_smp-exp_fast-step_up:
    tags:
      - src
      - nfc
      - ble
      - bt_nus
      - dfu_smp
      - exp_fast
      - step_up
    platform_allow: &platform_5340
      - nrf5340dk/nrf5340/cpuapp
    integration_platforms: *platform_5340
    extra_args:
      - app_SNIPPET="uwb_qm35_src;dfu_smp;bt_nus"
      - CONFIG_DFU_SMP_LOG_LEVEL_DBG=y
      - CONFIG_DOOR_LOCK_EXPEDITED_FAST_PHASE=y
      - CONFIG_DOOR_LOCK_STEP_UP_PHASE=y

# LIB,  5340,  UWB+NFC, ALIRO_STANDALONE, NUS+SMP, EXPF+STEPUP
  app.door_lock_src_no.nfc-ble-uwb.bt_nus-dfu_smp-exp_fast-step_up:
