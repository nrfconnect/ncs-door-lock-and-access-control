# Enable QM35 UWB module library
CONFIG_QM35_UWB_LIB=y

# Enable BLE Transport Protocol
CONFIG_ALIRO_BLE_UWB=y

# Disable NFC transport
CONFIG_DISABLE_ALIRO_NFC_TP=y

# Enable power management for the device
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y
