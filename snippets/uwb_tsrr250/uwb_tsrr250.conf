# Enable BLE + UWB Aliro transport.
CONFIG_DOOR_LOCK_BLE_UWB=y

# nRF54LM20 EngA currently bus faults in the SoftDevice/MPSL DPPI bridge setup
# by touching 0x50047004. Use Zephyr's split BLE controller while bringing up
# TSRR250 on this board.
CONFIG_BT_LL_SOFTDEVICE=n
CONFIG_BT_LL_SW_SPLIT=y

# Select the TrueSense TSRR250 / NXP SR250 UWB backend.
CONFIG_TSRR250_UWB_ALIRO_ZEPHYR=y

# Enable the NXP SR250/SR2XXT Zephyr module. The module path is supplied from
# the build command with EXTRA_ZEPHYR_MODULES.
CONFIG_SPI=y
CONFIG_SPI_ASYNC=y
CONFIG_GPIO=y
CONFIG_NXP_UWB_ZEPHYR_MODULE=y
CONFIG_NXP_UWB_DEVICE_SR2XXT=y

# Route boot, printk, log, and shell output to the DK serial monitor.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_LOG_BACKEND=n
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_PROCESS_THREAD=n
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=n
CONFIG_ASSERT_VERBOSE=y
CONFIG_RTT_CONSOLE=n
CONFIG_USE_SEGGER_RTT=n
CONFIG_LOG_BACKEND_RTT=n

# Keep device power management aligned with the existing UWB snippets.
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y
