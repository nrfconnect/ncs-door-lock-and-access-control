name: ncs-aliro
build:
  # Path to the Kconfig file that will be sourced into Zephyr Kconfig tree under
  # Zephyr > Modules > This application. Path is relative from root of this
  # repository.
  kconfig: Kconfig
  # Path to the folder that contains the CMakeLists.txt file to be included by
  # Zephyr build system. The `.` is the root of this repository.
  cmake: .
  settings:
    # Zephyr will use the `<dts_root>/dts` for additional dts files and
    # `<dts_root>/dts/bindings` for additional dts binding files. The `.` is
    # the root of this repository.
    dts_root: ncs-door-lock-and-access-control
    # Additional roots for snippets. Zephyr will use the
    # `<snippet_root>/snippets` for additional snippets. The `.` is the root
    # of this repository.
    snippet_root: ncs-door-lock-and-access-control
