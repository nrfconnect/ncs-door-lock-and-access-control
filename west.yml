manifest:
  self:
    west-commands: scripts/west-commands.yml
  remotes:
    - name: ncs
      url-base: https://github.com/nrfconnect
    - name: ncs-ssh
      url-base: git@github.com:nrfconnect
    - name: nrfconnect-uwb-qorvo
      url-base: git@gitlab.com:qorvo/qswg/public
  projects:
    - name: nrf
      remote: ncs
      repo-path: sdk-nrf
      revision: v3.3.0
      import: true
    - name: nrfconnect-sdk-qorvo
      remote: nrfconnect-uwb-qorvo
      repo-path: nrfconnect-uwb-sdk
      revision: QM35ALIRO_ENG-0.6.1
      groups:
        - nrfconnect-sdk-qorvo
    - name: ncs-door-lock-app-extensions
      remote: ncs-ssh
      repo-path: ncs-door-lock-app-extensions
      revision: v1.0.0
      groups:
        - ncs-door-lock-app-extensions
  group-filter:
    - -nrfconnect-sdk-qorvo
    - -ncs-door-lock-app-extensions
