manifest:
  self:
    west-commands: scripts/west-commands.yml
  remotes:
    - name: ncs
      url-base: https://github.com/nrfconnect
      # Needed for fetching private repositories as Git
      # does not allow for password authentication anymore.
    - name: ncs-ssh
      url-base: git@github.com:nrfconnect
  group-filter:
    - -aliro
  projects:
    - name: nrf
      remote: ncs
      repo-path: sdk-nrf
      revision: main
      import: true
    - name: aliro
      remote: ncs-ssh
      repo-path: ncs-aliro
      revision: 05e513871e8d718b3c5d778da8d5f2e951e01d63
      groups:
        - aliro
      import: false
